project:
  title: "Stochastic Computing ALU - Edge AI Optimized"
  author: "tiberthyn"
  description: |
    Stochastic-computing ALU.
    Implements multiplication (AND), averaged addition (MUX), and logic operations
    using probabilistic data representation. Includes a confidence flag based on
    online variance estimation for real-time quality monitoring.
  language: "Verilog"
  clock_hz: 25000000
  top_module: "tt_um_stoch_alu"
  source_files:
    - "verilog/rtl/user_proj.v"
  pinout:
    ui_in: "Operand A (8-bit binary)"
    uio: "[3:0]=Operand B, [6:4]=Opcode, [7]=Mode(0:exact,1:stochastic)"
    uo_out: "[6:0]=Result, [7]=Confidence Flag"
    clk: "25 MHz system clock"
    rst_n: "Active-low asynchronous reset"
  test_mode: "Simulate with iverilog or use Demoboard. Stochastic mode requires 64 cycles per operation."
  license: "CERN-OHL-S-2.0"
